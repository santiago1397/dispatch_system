# ============================================================================
# Dispatch Chicago — Nginx reverse proxy
# Domain: santiagoproperties.uk
#
# Routes:
#   santiagoproperties.uk     www.santiagoproperties.uk
#     → frontend (Next.js,  http://127.0.0.1:3333)
#
#   api.santiagoproperties.uk
#     → backend  (FastAPI,   http://127.0.0.1:8888)
#     → WebSocket direct from browser (ws://)
#
# HTTP only. TLS is configured separately by the operator.
# CORS is handled by the FastAPI backend (see backend/app/main.py and
# CORS_ORIGINS in .env.prod) — do not add Access-Control-Allow-Origin here.
#
# Multi-app VPS: only ONE vhost on the box may use `listen ... default_server`.
# This file does NOT claim default_server — add it back to ONE server block
# (typically the apex one) only if dispatch should be the catch-all for bare
# IP traffic. Otherwise leave it off and another vhost handles defaults.
#
# Install (Debian/Ubuntu):
#   1. Copy to /etc/nginx/sites-available/santiagoproperties.uk.conf
#   2. sudo ln -s ../sites-available/santiagoproperties.uk.conf /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# Required companion env (in dispatch_bot/.env.prod):
#   - POSTGRES_HOST=host.docker.internal
#   - CORS_ORIGINS=["https://santiagoproperties.uk","https://www.santiagoproperties.uk"]
#     (still https even when nginx listens on http — it's the public-facing
#      origin the browser sees. Update if your TLS setup changes the scheme.)
#   - NEXT_PUBLIC_WS_URL=ws://api.santiagoproperties.uk
#     (change to wss:// once TLS is in place; requires a frontend rebuild)
# ============================================================================

# Map must live in the http context. The browser opens a direct WebSocket
# from santiagoproperties.uk to ws://api.santiagoproperties.uk, so the
# upgrade dance has to work for any path the backend exposes.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ----------------------------------------------------------------------------
# Frontend — apex + www → Next.js standalone on 127.0.0.1:3333
# ----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    # Add `default_server;` here ONLY if dispatch should catch bare-IP
    # traffic. On a multi-app VPS, only one vhost may claim this — pick
    # the one app that's the "main" landing page.
    server_name santiagoproperties.uk www.santiagoproperties.uk;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss;

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}

# ----------------------------------------------------------------------------
# Backend API — api.santiagoproperties.uk → FastAPI on 127.0.0.1:8888
# ----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.santiagoproperties.uk;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }
}
