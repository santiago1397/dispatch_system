# Full stack development configuration (Frontend + Backend + Database)
# Usage: docker-compose -f docker-compose.full.yml up -d

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agents_bots_backend
    ports:
      - "8888:8888"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/cli:/app/cli:ro
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - ENVIRONMENT=local
      - POSTGRES_HOST=db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8888 --reload
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8888"
      - "prometheus.path=/metrics"

  db:
    image: postgres:16-alpine
    container_name: agents_bots_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-agents_bots}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agents_bots_frontend
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://host.docker.internal:8888
      - BACKEND_WS_URL=ws://host.docker.internal:8888
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    depends_on:
      - app

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
